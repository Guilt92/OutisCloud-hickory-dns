name: Build & Push OutisCloud Images

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Tag
        run: echo "TAG=$(date +%Y%m%d%H)-${GITHUB_SHA::7}" >> $GITHUB_ENV
 
      - name: Build & Push Control API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/control_api/Dockerfile
          push: true
          tags: |
            outis92/outiscloud-control-api:${{ env.TAG }}
            outis92/outiscloud-control-api:latest
 
      - name: Build & Push DNS Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: bin/Dockerfile
          push: true
          tags: |
            outis92/outiscloud-dns-server:${{ env.TAG }}
            outis92/outiscloud-dns-server:latest
 
      - name: Build & Push UI
        uses: docker/build-push-action@v5
        with:
          context: ./web/ui
          file: ./web/ui/Dockerfile
          push: true
          tags: |
            outis92/outiscloud-ui:${{ env.TAG }}
            outis92/outiscloud-ui:latest
